version: "3"

services:
  # --- COMPUTE LAYER (Python 3.10) ---
  spark-master:
    image: jupyter/pyspark-notebook:spark-3.3.0
    container_name: spark-master
    user: root
    command: /usr/local/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - bigdata-network

  spark-worker:
    image: jupyter/pyspark-notebook:spark-3.3.0
    container_name: spark-worker
    user: root
    depends_on:
      - spark-master
    command: /usr/local/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1G
    networks:
      - bigdata-network

  jupyter:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: bigdata-jupyter
    ports:
      - "8888:8888"
      # Expose the driver ports for the worker to connect back
      - "20002:20002" 
      - "8501:8501"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
    user: root
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data 
    networks:
      - bigdata-network
    command: start-notebook.sh --IdentityProvider.token=''

  # --- STORAGE LAYER (HDFS) ---
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - "9870:9870" # HDFS Browser UI
      - "9000:9000" # File System Port
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - ./training/data:/opt/workspace/data
    networks:
      - bigdata-network

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      - namenode
    networks:
      - bigdata-network

  # --- NOSQL LAYER (MongoDB) ---
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      # Persists your NoSQL data to your local host
      - ./mongo_data:/data/db
    networks:
      - bigdata-network

  # --- REAL-TIME EVENT STREAMING LAYER (Kafka) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bigdata-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - bigdata-network

networks:
  bigdata-network:
    name: bigdata-network
    driver: bridge